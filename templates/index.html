<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>相談・助言記録票 | 音声テキスト化アプリ</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #2E75B6 0%, #1F4E78 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .upload-section {
            background: #f8f9fa;
            padding: 30px;
            border-bottom: 2px solid #e0e0e0;
            text-align: center;
        }

        .upload-area {
            border: 3px dashed #2E75B6;
            border-radius: 8px;
            padding: 40px 20px;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }

        .upload-area:hover {
            background: #f0f7ff;
            border-color: #1F4E78;
        }

        .upload-area.drag-over {
            background: #e8f3ff;
            border-color: #1F4E78;
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .upload-text {
            color: #333;
            margin-bottom: 10px;
        }

        .upload-hint {
            color: #666;
            font-size: 12px;
        }

        .file-input {
            display: none;
        }

        .content {
            padding: 30px;
        }

        .form-section {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #e0e0e0;
        }

        .form-section h2 {
            color: #2E75B6;
            font-size: 18px;
            margin-bottom: 20px;
            border-left: 4px solid #2E75B6;
            padding-left: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: #333;
            font-size: 14px;
        }

        input[type="text"],
        input[type="date"],
        input[type="number"],
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: inherit;
            font-size: 14px;
        }

        textarea {
            min-height: 80px;
            resize: vertical;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-row.three {
            grid-template-columns: 1fr 1fr 1fr;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
            justify-content: center;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #2E75B6;
            color: white;
        }

        .btn-primary:hover {
            background: #1F4E78;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            border: 1px solid #ddd;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #e0e0e0;
            transform: translateY(-2px);
        }

        .copy-btn {
            padding: 4px 10px;
            font-size: 0.8rem;
            background: #e5e7eb;
            color: #374151;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }
        .copy-btn:hover {
            background: #d1d5db;
            transform: translateY(-1px);
        }

        .alert {
            padding: 15px;
            margin: 15px 0;
            border-radius: 4px;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }

        .alert.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }

        .transcription-display {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 4px;
            margin: 15px 0;
            border-left: 4px solid #2E75B6;
            max-height: 200px;
            overflow-y: auto;
        }

        .transcription-text {
            color: #333;
            line-height: 1.6;
        }

        .footer {
            text-align: center;
            padding: 20px;
            border-top: 1px solid #e0e0e0;
            color: #999;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <h1>🎤 相談・助言記録票</h1>
            <p>音声テキスト化アプリ | ローカル保存対応</p>
        </div>

        <div class="upload-section">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">🎙️</div>
                <div class="upload-text"><strong>音声ファイルをドラッグ&ドロップ</strong></div>
                <div class="upload-hint">またはクリックして選択 (MP3, WAV, M4A対応)</div>
                <input type="file" id="fileInput" class="file-input" accept=".mp3,.wav,.m4a,.flac,.ogg,.wma">
            </div>
            <div id="alert" class="alert"></div>
        </div>

        <div class="content">
            <form id="reportForm">
                <!-- 音声テキスト表示 -->
                <div id="transcriptionSection" style="display:none;">
                    <div class="form-section">
                        <h2>音声認識結果</h2>
                        <div class="transcription-display">
                            <div class="transcription-text" id="transcriptionText">（テキストがここに表示されます）</div>
                        </div>
                        <button type="button" class="btn-secondary" onclick="clearTranscription()">テキストをクリア</button>
                    </div>
                </div>

                <!-- 1. 訪問概要 -->
                <div class="form-section">
                    <h2>1. 訪問概要</h2>
                    
                    <div class="form-row three">
                        <div class="form-group">
                            <label>訪問年</label>
                            <input type="number" id="visitYear" name="visitYear" min="2020" max="2099">
                        </div>
                        <div class="form-group">
                            <label>月</label>
                            <input type="number" id="visitMonth" name="visitMonth" min="1" max="12">
                        </div>
                        <div class="form-group">
                            <label>日</label>
                            <input type="number" id="visitDay" name="visitDay" min="1" max="31">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>訪問のきっかけ</label>
                        <textarea id="motivation" name="motivation"></textarea>
                    </div>
                </div>

                <!-- 2. 相談対象者 -->
                <div class="form-section">
                    <h2>2. 相談対象者</h2>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>相談対象者名</label>
                            <input type="text" id="clientName" name="clientName">
                        </div>
                        <div class="form-group">
                            <label>役職</label>
                            <input type="text" id="clientPosition" name="clientPosition">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>企業名</label>
                            <input type="text" id="companyName" name="companyName">
                        </div>
                        <div class="form-group">
                            <label>従業員数</label>
                            <input type="number" id="employeeCount" name="employeeCount">
                        </div>
                    </div>
                </div>

                <!-- 3. 実施方法 -->
                <div class="form-section">
                    <h2>3. 実施方法</h2>
                    
                    <div class="form-group">
                        <label>相談・助言実施方法</label>
                        <textarea id="method" name="method"></textarea>
                    </div>
                </div>

                <!-- 4. 会社概要 -->
                <div class="form-section">
                    <h2>4. 会社概要（労働構造等）</h2>
                    
                    <div class="form-group">
                        <label>①労働構造</label>
                        <textarea id="laborStructure" name="laborStructure"></textarea>
                    </div>

                    <div class="form-group">
                        <label>具体的な状況</label>
                        <textarea id="laborStructureDetail" name="laborStructureDetail"></textarea>
                    </div>

                    <div class="form-group">
                        <label>②採用状況</label>
                        <textarea id="recruitment" name="recruitment"></textarea>
                    </div>

                    <div class="form-group">
                        <label>具体的な状況</label>
                        <textarea id="recruitmentDetail" name="recruitmentDetail"></textarea>
                    </div>

                    <div class="form-group">
                        <label>③高齢者の活用</label>
                        <textarea id="seniorEmployment" name="seniorEmployment"></textarea>
                    </div>

                    <div class="form-group">
                        <label>具体的な状況</label>
                        <textarea id="seniorEmploymentDetail" name="seniorEmploymentDetail"></textarea>
                    </div>
                </div>

                <!-- 5. 高年齢者雇用の改善・課題 -->
                <div class="form-section">
                    <h2>5. 高年齢者雇用の改善・課題</h2>
                    
                    <div class="form-group">
                        <label>雇用確保措置</label>
                        <textarea id="employmentMeasures" name="employmentMeasures"></textarea>
                    </div>

                    <div class="form-group">
                        <label>課題</label>
                        <textarea id="issues" name="issues"></textarea>
                    </div>

                    <div class="form-group">
                        <label>助言内容</label>
                        <textarea id="advice" name="advice"></textarea>
                    </div>
                </div>

                <!-- 6. 相談・助言の成果 -->
                <div class="form-section">
                    <h2>6. 相談・助言の成果</h2>
                    
                    <div class="form-row three">
                        <div class="form-group">
                            <label>報告年</label>
                            <input type="number" id="reportYear" name="reportYear" min="2020" max="2099">
                        </div>
                        <div class="form-group">
                            <label>月</label>
                            <input type="number" id="reportMonth" name="reportMonth" min="1" max="12">
                        </div>
                        <div class="form-group">
                            <label>日</label>
                            <input type="number" id="reportDay" name="reportDay" min="1" max="31">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>結論</label>
                        <input type="text" id="conclusion" name="conclusion">
                    </div>

                    <div class="form-group">
                        <label>所見理由</label>
                        <textarea id="conclusionReason" name="conclusionReason"></textarea>
                    </div>
                </div>

                <!-- ボタングループ -->
                <div class="button-group">
                    <button type="button" class="btn-primary" onclick="downloadExcel()">📊 Excelでダウンロード</button>
                    <button type="button" class="btn-primary" onclick="downloadHTML()">📄 HTMLで保存</button>
                    <button type="reset" class="btn-secondary">🔄 クリア</button>
                </div>
            </form>
        </div>

        <div class="footer">
            <p>© 2026 社労士向け相談・助言記録票 | 完全ローカル保存対応</p>
        </div>
    </div>

    <script>
        // ファイルアップロード処理
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const transcriptionSection = document.getElementById('transcriptionSection');
        const transcriptionText = document.getElementById('transcriptionText');

        // ファイルピッカーエリアのクリック処理
        uploadArea.addEventListener('click', (e) => {
            if (e.target.id !== 'fileInput') {
                fileInput.click();
            }
        });

        // 全てのフォーム要素にコピーボタンを追加
        window.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.form-group').forEach(group => {
                const label = group.querySelector('label');
                const input = group.querySelector('input, textarea, select');
                
                // label と input/textarea が存在する場合のみ追加
                if (label && input && input.id) {
                    const headerDiv = document.createElement('div');
                    headerDiv.style.display = 'flex';
                    headerDiv.style.justifyContent = 'space-between';
                    headerDiv.style.alignItems = 'center';
                    headerDiv.style.marginBottom = '5px';
                    
                    group.insertBefore(headerDiv, label);
                    headerDiv.appendChild(label);
                    label.style.marginBottom = '0';
                    
                    const copyBtn = document.createElement('button');
                    copyBtn.type = 'button';
                    copyBtn.className = 'copy-btn';
                    copyBtn.innerHTML = '📋 コピー';
                    copyBtn.title = '入力内容をクリップボードにコピー';
                    
                    copyBtn.onclick = () => {
                        let textToCopy = '';
                        // 年月日フィールドの場合は3つの入力欄を結合する
                        if (input.id === 'visitYear' || input.id === 'reportYear') {
                            const prefix = input.id.replace('Year', '');
                            const y = document.getElementById(prefix + 'Year').value;
                            const m = document.getElementById(prefix + 'Month').value;
                            const d = document.getElementById(prefix + 'Day').value;
                            if (y && m && d) textToCopy = `${y}年${m}月${d}日`;
                        } else {
                            textToCopy = input.value;
                        }
                        
                        if (textToCopy) {
                            navigator.clipboard.writeText(textToCopy).then(() => {
                                const originalText = copyBtn.innerHTML;
                                copyBtn.innerHTML = '✅ コピー済';
                                copyBtn.style.background = '#10b981';
                                copyBtn.style.color = 'white';
                                setTimeout(() => {
                                    copyBtn.innerHTML = originalText;
                                    copyBtn.style.background = '';
                                    copyBtn.style.color = '';
                                }, 2000);
                            });
                        } else {
                            // コピーするテキストがない場合
                            const originalText = copyBtn.innerHTML;
                            copyBtn.innerHTML = '⚠️ 空欄です';
                            setTimeout(() => { copyBtn.innerHTML = originalText; }, 1500);
                        }
                    };
                    headerDiv.appendChild(copyBtn);
                }
            });
        });

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('drag-over');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('drag-over');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('drag-over');
            handleFileSelect(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', (e) => {
            handleFileSelect(e.target.files);
        });

        function handleFileSelect(files) {
            if (files.length === 0) return;
            
            const file = files[0];
            const formData = new FormData();
            formData.append('file', file);

            showAlert('🔄 音声を処理中...', 'info');

            fetch('/transcribe', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    transcriptionText.textContent = data.transcript;
                    transcriptionSection.style.display = 'block';
                    
                    if (data.parsed_data && Object.keys(data.parsed_data).length > 0) {
                        const d = data.parsed_data;
                        if (d.visitDate) {
                            const dateMatch = d.visitDate.match(/(\d{4})年(\d{1,2})月(\d{1,2})日/);
                            if (dateMatch) {
                                document.getElementById('visitYear').value = dateMatch[1];
                                document.getElementById('visitMonth').value = dateMatch[2];
                                document.getElementById('visitDay').value = dateMatch[3];
                            }
                        }
                        if (d.officeNumber) document.getElementById('officeNumber').value = d.officeNumber;
                        if (d.companyName) document.getElementById('companyName').value = d.companyName;
                        if (d.address) document.getElementById('address').value = d.address;
                        if (d.visitAddress) document.getElementById('visitAddress').value = d.visitAddress;
                        if (d.phone) document.getElementById('phone').value = d.phone;
                        if (d.contactPerson) document.getElementById('contactPerson').value = d.contactPerson;
                        if (d.companyOverview) document.getElementById('companyOverview').value = d.companyOverview;
                        if (d.contactPerson && document.getElementById('clientName')) document.getElementById('clientName').value = d.contactPerson;
                        if (d.motivation && document.getElementById('motivation')) document.getElementById('motivation').value = d.motivation;
                        if (d.method && document.getElementById('method')) document.getElementById('method').value = d.method;
                        if (d.laborStructure && document.getElementById('laborStructure')) document.getElementById('laborStructure').value = d.laborStructure;
                        if (d.laborStructureDetail && document.getElementById('laborStructureDetail')) document.getElementById('laborStructureDetail').value = d.laborStructureDetail;
                        if (d.recruitment && document.getElementById('recruitment')) document.getElementById('recruitment').value = d.recruitment;
                        if (d.recruitmentDetail && document.getElementById('recruitmentDetail')) document.getElementById('recruitmentDetail').value = d.recruitmentDetail;
                        if (d.seniorEmployment && document.getElementById('seniorEmployment')) document.getElementById('seniorEmployment').value = d.seniorEmployment;
                        if (d.seniorEmploymentDetail && document.getElementById('seniorEmploymentDetail')) document.getElementById('seniorEmploymentDetail').value = d.seniorEmploymentDetail;
                        if (d.employmentMeasures && document.getElementById('employmentMeasures')) document.getElementById('employmentMeasures').value = d.employmentMeasures;
                        if (d.issues && document.getElementById('issues')) document.getElementById('issues').value = d.issues;
                        if (d.advice && document.getElementById('advice')) document.getElementById('advice').value = d.advice;
                        if (d.conclusion && document.getElementById('conclusion')) document.getElementById('conclusion').value = d.conclusion;
                        if (d.conclusionReason && document.getElementById('conclusionReason')) document.getElementById('conclusionReason').value = d.conclusionReason;
                        
                        showAlert('✅ 音声のテキスト化とAIによる自動入力が完了しました！', 'success');
                    } else {
                        showAlert('✅ テキスト化完了！', 'success');
                    }
                } else {
                    showAlert('❌ エラー: ' + (data.error || '不明なエラー'), 'error');
                }
            })
            .catch(error => {
                showAlert('❌ エラーが発生しました: ' + error.message, 'error');
            });
        }

        function clearTranscription() {
            transcriptionText.textContent = '（テキストがここに表示されます）';
            transcriptionSection.style.display = 'none';
        }

        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = `alert show ${type === 'error' ? 'error' : type === 'success' ? 'success' : ''}`;
            if (type === 'success') {
                setTimeout(() => {
                    alert.classList.remove('show');
                }, 3000);
            }
        }

        function downloadExcel() {
            const form = document.getElementById('reportForm');
            const formData = new FormData(form);
            const data = {};
            formData.forEach((value, key) => {
                data[key] = value;
            });

            const wb = XLSX.utils.book_new();
            const ws_data = [
                ['相談・助言記録票'],
                [''],
                ['1. 訪問概要'],
                ['訪問日', `${data.visitYear}年${data.visitMonth}月${data.visitDay}日`],
                ['訪問のきっかけ', data.motivation || ''],
                [''],
                ['2. 相談対象者'],
                ['相談対象者名', data.clientName || ''],
                ['役職', data.clientPosition || ''],
                ['企業名', data.companyName || ''],
                ['従業員数', data.employeeCount || ''],
                [''],
                ['3. 実施方法'],
                ['相談・助言実施方法', data.method || ''],
                [''],
                ['4. 会社概要（労働構造等）'],
                ['①労働構造', data.laborStructure || ''],
                ['具体的な状況', data.laborStructureDetail || ''],
                ['②採用状況', data.recruitment || ''],
                ['具体的な状況', data.recruitmentDetail || ''],
                ['③高齢者の活用', data.seniorEmployment || ''],
                ['具体的な状況', data.seniorEmploymentDetail || ''],
                [''],
                ['5. 高年齢者雇用の改善・課題'],
                ['雇用確保措置', data.employmentMeasures || ''],
                ['課題', data.issues || ''],
                ['助言内容', data.advice || ''],
                [''],
                ['6. 相談・助言の成果'],
                ['報告日', `${data.reportYear}年${data.reportMonth}月${data.reportDay}日`],
                ['結論', data.conclusion || ''],
                ['所見理由', data.conclusionReason || '']
            ];

            const ws = XLSX.utils.aoa_to_sheet(ws_data);
            XLSX.utils.book_append_sheet(wb, ws, '相談助言記録票');
            XLSX.writeFile(wb, `相談助言記録票_${new Date().getTime()}.xlsx`);
            showAlert('✅ Excelファイルをダウンロードしました', 'success');
        }

        function downloadHTML() {
            const form = document.getElementById('reportForm');
            const formData = new FormData(form);
            const data = {};
            formData.forEach((value, key) => {
                data[key] = value;
            });

            const htmlContent = `<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>相談・助言記録票</title>
    <style>
        body { font-family: 'Noto Sans JP', sans-serif; padding: 40px; line-height: 1.8; color: #333; }
        h1 { color: #2E75B6; text-align: center; margin-bottom: 40px; }
        h2 { color: #2E75B6; font-size: 16px; border-bottom: 2px solid #2E75B6; padding-bottom: 8px; margin-top: 30px; margin-bottom: 15px; }
        .record-row { display: grid; grid-template-columns: 200px 1fr; gap: 20px; margin-bottom: 15px; }
        .label { font-weight: 600; color: #374151; }
        .value { color: #111827; white-space: pre-wrap; }
        .footer { margin-top: 60px; text-align: center; color: #999; font-size: 12px; border-top: 1px solid #e0e0e0; padding-top: 20px; }
    </style>
</head>
<body>
    <h1>相談・助言記録票</h1>
    
    <h2>1. 訪問概要</h2>
    <div class="record-row"><div class="label">訪問日</div><div class="value">${data.visitYear}年${data.visitMonth}月${data.visitDay}日</div></div>
    <div class="record-row"><div class="label">訪問のきっかけ</div><div class="value">${data.motivation || '（未入力）'}</div></div>
    
    <h2>2. 相談対象者</h2>
    <div class="record-row"><div class="label">相談対象者名</div><div class="value">${data.clientName || '（未入力）'}</div></div>
